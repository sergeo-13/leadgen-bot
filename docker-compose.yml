version: '3.8'

services:
  leadgen-kb-api:
    build: .
    container_name: leadgen-kb-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: leadgen-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: leadgen
      POSTGRES_USER: leadgen
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: leadgen-docs
      MINIO_SECURE: "false"
    networks:
      - leadgen_net
    depends_on:
      - healthcheck

  healthcheck:
    image: busybox
    networks:
      - leadgen_net

networks:
  leadgen_net:
    external: false
